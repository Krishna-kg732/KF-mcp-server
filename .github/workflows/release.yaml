name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test_pypi:
        description: "Publish to Test PyPI instead of PyPI (dry-run)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact-name: ${{ steps.version.outputs.artifact-name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup build environment
        run: |
          make verify

      - name: Run unit tests
        run: |
          make test-python

      - name: Verify version
        id: version
        run: |
          set -euo pipefail

          PROJECT_VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          CODE_VERSION="$(python -c "import kubeflow_mcp; print(kubeflow_mcp.__version__)")"

          echo "Project version: $PROJECT_VERSION"
          echo "Code version: $CODE_VERSION"

          if [[ "$PROJECT_VERSION" != "$CODE_VERSION" ]]; then
            echo "Version mismatch between pyproject.toml and kubeflow_mcp/__init__.py"
            exit 1
          fi

          if [[ ! "$PROJECT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(rc[0-9]+)?$ ]]; then
            echo "Version must use PEP 440 release format X.Y.Z or X.Y.ZrcN"
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG_VERSION="${{ github.event.release.tag_name }}"
            echo "Release tag: $TAG_VERSION"
            if [[ "$TAG_VERSION" != "$PROJECT_VERSION" ]]; then
              echo "Release tag must match the package version exactly"
              exit 1
            fi
          fi

          echo "version=$PROJECT_VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact-name=dist-$PROJECT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Version verified: $PROJECT_VERSION"

      - name: Build and validate package
        run: |
          uv build
          uvx twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.version.outputs.artifact-name }}
          path: dist/

  publish-test-pypi:
    name: Publish to Test PyPI
    needs: [build]
    if: github.event_name == 'workflow_dispatch' && inputs.test_pypi
    runs-on: ubuntu-latest
    environment:
      name: test-pypi
      url: https://test.pypi.org/project/kubeflow-mcp/
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

  publish-pypi:
    name: Publish to PyPI
    needs: [build]
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/kubeflow-mcp/
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
